name: enpc_mobile
description: ENPC Official Communication System - Mobile Client
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & API
  http: ^1.2.1
  
  # Secure storage for JWT token
  flutter_secure_storage: ^9.0.0
  
  # State management
  provider: ^6.1.2
  
  # UI & Icons
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  
  # Date formatting
  timeago: ^3.6.1
  intl: ^0.19.0
  
  # File handling & image picker
  image_picker: ^1.1.2
  file_picker: ^8.0.3
  
  # Misc utils
  shared_preferences: ^2.2.3
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/

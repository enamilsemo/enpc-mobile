name: enpc_mobile
description: ENPC Official Communication System - Mobile Client
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.6.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & API
  http: ^1.2.2

  # Secure storage for JWT token (requires minSdk 23)
  flutter_secure_storage: ^9.2.2

  # State management
  provider: ^6.1.2

  # UI & Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1

  # Date formatting
  timeago: ^3.7.0
  intl: ^0.19.0

  # File handling & image picker
  image_picker: ^1.1.2
  file_picker: ^8.1.4

  # Misc utils
  shared_preferences: ^2.3.3
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

name: Build ENPC APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter 3.41.9
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'
          cache: true

      - name: Flutter version info
        run: flutter --version

      - name: Install dependencies
        run: |
          flutter clean
          flutter pub get

      - name: Analyze (non-fatal)
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        continue-on-error: true

      - name: Build APK split per ABI
        run: flutter build apk --release --split-per-abi

      - name: Build universal APK
        run: flutter build apk --release

      - name: List built APKs
        run: ls -lh build/app/outputs/flutter-apk/

      - name: Upload arm64-v8a APK
        uses: actions/upload-artifact@v4
        with:
          name: ENPC-arm64-release
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          if-no-files-found: error

      - name: Upload armeabi-v7a APK
        uses: actions/upload-artifact@v4
        with:
          name: ENPC-armeabi-release
          path: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          if-no-files-found: warn

      - name: Upload universal APK
        uses: actions/upload-artifact@v4
        with:
          name: ENPC-universal-release
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: warn
